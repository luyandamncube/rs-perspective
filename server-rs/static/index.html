<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Streaming Table Debug</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #0b0f14;
        color: #e8edf2;
        font-family: monospace;
      }

      .page {
        padding: 16px;
      }

      h1 {
        margin: 0 0 12px 0;
        font-size: 20px;
      }

      .status {
        margin-bottom: 16px;
        padding: 12px;
        border: 1px solid #334155;
        background: #111827;
      }

      pre {
        margin: 0 0 16px 0;
        padding: 12px;
        min-height: 180px;
        overflow: auto;
        white-space: pre-wrap;
        background: #111827;
        border: 1px solid #334155;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #111827;
      }

      th, td {
        border: 1px solid #334155;
        padding: 8px;
        text-align: left;
      }

      th {
        background: #1f2937;
      }

      .ok { color: #22c55e; }
      .fail { color: #ef4444; }
      .info { color: #60a5fa; }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Streaming Table Debug</h1>

      <div class="status" id="summary">
        Waiting to start…
      </div>

      <pre id="log"></pre>

      <table>
        <thead>
          <tr>
            <th>symbol</th>
            <th>price</th>
            <th>size</th>
            <th>ts</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <script type="module">
      import perspective from "/perspective/client/esm/perspective.js?v=400";

      const summaryEl = document.getElementById("summary");
      const logEl = document.getElementById("log");
      const rowsEl = document.getElementById("rows");

      function log(kind, ...args) {
        const text = args.map(v => {
          try {
            return typeof v === "string" ? v : JSON.stringify(v, null, 2);
          } catch {
            return String(v);
          }
        }).join(" ");

        console.log(...args);

        const prefix =
          kind === "ok" ? "[OK] " :
          kind === "fail" ? "[FAIL] " :
          "[INFO] ";

        logEl.textContent += prefix + text + "\n";
      }

      function setSummary(text) {
        summaryEl.textContent = text;
      }

      function renderRows(rows) {
        rowsEl.innerHTML = "";

        for (const row of rows) {
          const tr = document.createElement("tr");

          const tsValue =
            typeof row.ts === "number"
              ? new Date(row.ts).toISOString()
              : String(row.ts ?? "");

          tr.innerHTML = `
            <td>${row.symbol ?? ""}</td>
            <td>${row.price ?? ""}</td>
            <td>${row.size ?? ""}</td>
            <td>${tsValue}</td>
          `;

          rowsEl.appendChild(tr);
        }
      }

      async function runStep(name, fn) {
        log("info", `--- ${name} ---`);
        const result = await fn();
        log("ok", `${name} succeeded`);
        return result;
      }

      async function main() {
        setSummary("Running streaming diagnostics…");

        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${protocol}://${window.location.host}/ws`;

        log("info", "Page loaded");
        log("info", "URL:", window.location.href);
        log("info", "WS URL:", wsUrl);

        await runStep("client wasm init", async () => {
          perspective.init_client(
            fetch("/perspective/client/wasm/perspective-client.wasm?v=400")
          );
        });

        const client = await runStep("websocket connect", async () => {
          return await perspective.websocket(wsUrl);
        });

        const hostedTables = await runStep("get hosted table names", async () => {
          return await client.get_hosted_table_names();
        });
        log("info", "Hosted tables:", hostedTables);

        const table = await runStep("open hosted table 'ticks'", async () => {
          return await client.open_table("ticks");
        });

        async function refreshRows() {
          const view = await table.view();
          const data = await view.to_json();
          const latest = data.slice(-20).reverse();

          // log("info", `refresh row count: ${data.length}`);
          renderRows(latest);
          setSummary(`Connected. Showing latest ${latest.length} rows from ${data.length} total.`);
        }

        await runStep("initial read + render", async () => {
          await refreshRows();
        });

        setInterval(() => {
          refreshRows().catch(err => {
            log("fail", "refresh failed:", err?.stack || err?.message || String(err));
          });
        }, 1000);
      }

      window.addEventListener("error", (event) => {
        log("fail", "WINDOW ERROR:", event.message);
      });

      window.addEventListener("unhandledrejection", (event) => {
        log("fail", "UNHANDLED REJECTION:", event.reason?.stack || event.reason?.message || String(event.reason));
      });

      window.addEventListener("DOMContentLoaded", () => {
        main().catch((err) => {
          setSummary("Diagnostics stopped.");
          log("fail", err?.stack || err?.message || String(err));
        });
      });
    </script>
  </body>
</html>
